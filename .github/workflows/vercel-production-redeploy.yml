name: Force Vercel Production Redeploy

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: vercel-production-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  redeploy-production:
    name: Redeploy production from Preview PR
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      (github.head_ref == 'Preview' || github.head_ref == 'preview') &&
      github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Check out PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Pull Vercel production settings
        run: npx --yes vercel@latest pull --yes --environment=production --token "$VERCEL_TOKEN"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Build production artifact
        run: npx --yes vercel@latest build --prod --token "$VERCEL_TOKEN"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Force production redeploy
        run: npx --yes vercel@latest deploy --prebuilt --prod --force --yes --token "$VERCEL_TOKEN"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
