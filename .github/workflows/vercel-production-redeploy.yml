name: Preview PR Checks and Production Redeploy

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
      - closed

permissions:
  checks: read
  contents: read
  pull-requests: read

concurrency:
  group: preview-pr-${{ github.event.pull_request.number }}-${{ github.event.action }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate Preview PR
    if: >-
      github.event.action != 'closed' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      (github.head_ref == 'Preview' || github.head_ref == 'preview') &&
      github.event.pull_request.draft == false
    runs-on: ubuntu-latest

    steps:
      - name: Check out PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run typecheck
        run: npm run typecheck

      - name: Run production build
        run: npm run build

  redeploy-production:
    name: Redeploy production after merge
    if: >-
      github.event.pull_request.merged == true &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      (github.head_ref == 'Preview' || github.head_ref == 'preview') &&
      github.event.pull_request.base.ref == 'main'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Require successful PR checks
        uses: actions/github-script@v7
        with:
          script: |
            const headSha = context.payload.pull_request.head.sha;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const deadline = Date.now() + 5 * 60 * 1000;

            while (Date.now() < deadline) {
              const { data } = await github.rest.checks.listForRef({
                owner,
                repo,
                ref: headSha,
                per_page: 100,
              });

              const validateCheck = data.check_runs.find((check) => check.name === 'Validate Preview PR');

              if (validateCheck?.conclusion === 'success') {
                core.info(`PR checks passed for ${headSha}.`);
                return;
              }

              if (validateCheck && validateCheck.status === 'completed') {
                core.setFailed(`PR checks finished with conclusion: ${validateCheck.conclusion}.`);
                return;
              }

              core.info('Waiting for PR checks to finish before deploying...');
              await new Promise((resolve) => setTimeout(resolve, 15000));
            }

            core.setFailed('Timed out waiting for PR checks to finish.');

      - name: Check out merged main
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Force production redeploy
        run: npx --yes vercel@latest deploy --prod --force --yes --token "$VERCEL_TOKEN"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
